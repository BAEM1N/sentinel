<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sentinel{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Pretendard Variable"', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Helvetica Neue', 'sans-serif'],
            mono: ['"SF Mono"', 'Consolas', '"Liberation Mono"', 'Menlo', 'monospace'],
          },
          colors: {
            ink: { DEFAULT: '#111', light: '#444', muted: '#888', faint: '#bbb', wash: '#f7f7f7' },
            rule: { DEFAULT: '#e0e0e0', dark: '#111' },
          },
          fontSize: {
            '2xs': ['0.65rem', { lineHeight: '1' }],
          },
        },
      },
    }
  </script>
  <style>
    * { font-feature-settings: 'ss01', 'cv11'; }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Nav active indicator */
    .nav-link { position: relative; }
    .nav-link.active { color: #111; }
    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -17px;
      left: 0;
      right: 0;
      height: 1.5px;
      background: #111;
    }

    /* Table row fade-in */
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .row-animate { animation: rowIn 0.2s ease-out both; }

    /* Form elements */
    select, input[type="date"], input[type="text"] {
      font-family: inherit;
      outline: none;
    }
    select:focus, input:focus {
      border-color: #111 !important;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-white text-ink font-sans min-h-screen flex flex-col">

  <!-- Navigation -->
  <nav class="border-b border-rule flex-shrink-0">
    <div class="max-w-[960px] mx-auto px-6 h-12 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a href="/" class="text-sm font-bold tracking-[-0.02em] uppercase">Sentinel</a>
        <div class="flex gap-5 text-[13px] text-ink-muted">
          <a href="/" class="nav-link hover:text-ink {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
          <a href="/traces" class="nav-link hover:text-ink {% if active_page == 'traces' %}active{% endif %}">Traces</a>
          <a href="/prompts" class="nav-link hover:text-ink {% if active_page == 'prompts' %}active{% endif %}">Prompts</a>
          <a href="/eval" class="nav-link hover:text-ink {% if active_page == 'eval' %}active{% endif %}">Eval</a>
          <a href="/reviews" class="nav-link hover:text-ink {% if active_page == 'reviews' %}active{% endif %}">Reviews</a>
          <a href="/datasets" class="nav-link hover:text-ink {% if active_page == 'datasets' %}active{% endif %}">Datasets</a>
          <a href="/reports" class="nav-link hover:text-ink {% if active_page == 'reports' %}active{% endif %}">Reports</a>
          <a href="/alerts" class="nav-link hover:text-ink {% if active_page == 'alerts' %}active{% endif %}">Alerts</a>
          <a href="/approvals" class="nav-link hover:text-ink {% if active_page == 'approvals' %}active{% endif %}">Approvals</a>
          <a href="/jobs" class="nav-link hover:text-ink {% if active_page == 'jobs' %}active{% endif %}">Jobs</a>
          <a href="/audit" class="nav-link hover:text-ink {% if active_page == 'audit' %}active{% endif %}">Audit</a>
        </div>
      </div>
      <a href="/settings" class="text-2xs text-ink-faint tracking-wide uppercase hover:text-ink transition-colors {% if active_page == 'settings' %}text-ink{% endif %}">Settings</a>
    </div>
  </nav>

  <!-- Content -->
  <main class="flex-1 max-w-[960px] w-full mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-rule flex-shrink-0">
    <div class="max-w-[960px] mx-auto px-6 h-10 flex items-center justify-between text-2xs text-ink-faint tracking-wide">
      <span>Sentinel v0.0.1</span>
      <span>Powered by Langfuse</span>
    </div>
  </footer>

</body>
</html>
