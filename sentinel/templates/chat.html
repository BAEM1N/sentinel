{% extends "base.html" %}

{% block title %}Chat — Sentinel{% endblock %}

{% block head %}
<style>
  /* Chat container — Gemini-style centered layout */
  .chat-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 8.5rem);
    max-width: 720px;
    margin: 0 auto;
  }

  /* Welcome state */
  .chat-welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    opacity: 1;
    transition: opacity 0.3s ease;
  }
  .chat-welcome.hidden { display: none; }

  /* Messages area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 0;
    display: none;
  }
  .chat-messages.visible { display: block; }

  .msg { margin-bottom: 1.5rem; animation: msgIn 0.25s ease-out; }
  .msg-user { text-align: right; }
  .msg-user .msg-bubble {
    display: inline-block;
    background: #f3f3f3;
    border-radius: 1.25rem 1.25rem 0.25rem 1.25rem;
    padding: 0.75rem 1rem;
    max-width: 85%;
    text-align: left;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .msg-agent .msg-bubble {
    font-size: 0.9rem;
    line-height: 1.75;
    color: #222;
  }
  .msg-agent .msg-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #999;
    margin-bottom: 0.35rem;
    font-weight: 600;
  }

  /* Streaming cursor */
  .streaming .msg-bubble::after {
    content: '▊';
    animation: blink 0.8s infinite;
    color: #999;
    margin-left: 1px;
  }

  /* Input area — Gemini-style floating bar */
  .chat-input-area {
    flex-shrink: 0;
    padding: 1rem 0 0.5rem 0;
  }
  .chat-input-wrap {
    background: #f7f7f7;
    border: 1px solid #e8e8e8;
    border-radius: 1.5rem;
    padding: 0.75rem 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .chat-input-wrap:focus-within {
    border-color: #ccc;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .chat-input-wrap textarea {
    width: 100%;
    border: none;
    background: transparent;
    resize: none;
    outline: none;
    font-family: inherit;
    font-size: 0.9rem;
    line-height: 1.5;
    color: #111;
    min-height: 1.5rem;
    max-height: 8rem;
    overflow-y: auto;
  }
  .chat-input-wrap textarea::placeholder { color: #aaa; }

  .chat-input-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.5rem;
  }
  .chat-input-actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .chat-input-actions button {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    padding: 0.25rem;
    border-radius: 0.5rem;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: color 0.15s;
  }
  .chat-input-actions button:hover { color: #333; }

  .chat-send-btn {
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    border: none;
    background: #111;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
  }
  .chat-send-btn:disabled { opacity: 0.25; cursor: default; }
  .chat-send-btn svg { width: 14px; height: 14px; }

  /* Suggestion chips */
  .suggestion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
  }
  .chip {
    padding: 0.5rem 1rem;
    border: 1px solid #e0e0e0;
    border-radius: 1.25rem;
    font-size: 0.8rem;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
  }
  .chip:hover {
    border-color: #999;
    color: #111;
    background: #fafafa;
  }

  /* Markdown rendering in agent messages */
  .msg-agent .msg-bubble p { margin: 0.5em 0; }
  .msg-agent .msg-bubble p:first-child { margin-top: 0; }
  .msg-agent .msg-bubble code {
    background: #f0f0f0;
    padding: 0.15em 0.4em;
    border-radius: 0.25em;
    font-size: 0.85em;
    font-family: 'SF Mono', Consolas, monospace;
  }
  .msg-agent .msg-bubble pre {
    background: #f5f5f5;
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    overflow-x: auto;
    margin: 0.75em 0;
  }
  .msg-agent .msg-bubble pre code {
    background: none;
    padding: 0;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
{% endblock %}

{% block content %}
<div class="chat-container">

  <!-- Welcome state (shown when no messages) -->
  <div class="chat-welcome" id="chatWelcome">
    <div style="text-align:center;">
      <div style="font-size:1.5rem; font-weight:700; letter-spacing:-0.03em; margin-bottom:0.25rem;">Sentinel</div>
      <div style="font-size:0.8rem; color:#888;">LLMOps Agent와 대화하세요</div>
    </div>
    <div class="suggestion-chips">
      <div class="chip" onclick="sendSuggestion(this)">최근 트레이스를 분석해줘</div>
      <div class="chip" onclick="sendSuggestion(this)">일일 보고서를 생성해줘</div>
      <div class="chip" onclick="sendSuggestion(this)">평가 점수가 낮은 항목은?</div>
      <div class="chip" onclick="sendSuggestion(this)">프롬프트 성능을 비교해줘</div>
    </div>
  </div>

  <!-- Messages (shown after first message) -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- Input area — Gemini-style -->
  <div class="chat-input-area">
    <form id="chatForm" onsubmit="return handleSubmit(event)">
      <input type="hidden" name="_csrf_token" value="{{ request.state.csrf_token }}" />
      <div class="chat-input-wrap">
        <textarea
          id="chatInput"
          name="message"
          placeholder="Sentinel에게 질문하세요"
          rows="1"
          oninput="autoResize(this)"
          onkeydown="handleKeyDown(event)"
        ></textarea>
        <div class="chat-input-bottom">
          <div class="chat-input-actions">
            <button type="button" onclick="clearChat()" title="새 대화">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              새 대화
            </button>
          </div>
          <button type="submit" class="chat-send-btn" id="sendBtn" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </form>
  </div>

</div>

<script>
let threadId = null;
let isStreaming = false;

const chatMessages = document.getElementById('chatMessages');
const chatWelcome = document.getElementById('chatWelcome');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

chatInput.addEventListener('input', () => {
  sendBtn.disabled = !chatInput.value.trim() || isStreaming;
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 128) + 'px';
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (chatInput.value.trim() && !isStreaming) handleSubmit(e);
  }
}

function sendSuggestion(el) {
  chatInput.value = el.textContent;
  handleSubmit(new Event('submit'));
}

function clearChat() {
  threadId = null;
  chatMessages.innerHTML = '';
  chatMessages.classList.remove('visible');
  chatWelcome.classList.remove('hidden');
  chatInput.value = '';
  chatInput.style.height = 'auto';
  sendBtn.disabled = true;
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  if (role === 'agent') {
    div.innerHTML = `<div class="msg-label">Sentinel</div><div class="msg-bubble">${content}</div>`;
  } else {
    div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
  }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderMarkdown(text) {
  // Minimal markdown: code blocks, inline code, bold, newlines
  let html = escapeHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Newlines to paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  return html;
}

async function handleSubmit(e) {
  e.preventDefault();
  const message = chatInput.value.trim();
  if (!message || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;

  // Show messages area
  chatWelcome.classList.add('hidden');
  chatMessages.classList.add('visible');

  // Add user message
  addMessage('user', message);
  chatInput.value = '';
  chatInput.style.height = 'auto';

  // Add agent placeholder
  const agentDiv = addMessage('agent', '');
  agentDiv.classList.add('streaming');
  const bubble = agentDiv.querySelector('.msg-bubble');
  let fullText = '';

  try {
    const csrfToken = document.querySelector('input[name="_csrf_token"]').value;
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': csrfToken,
      },
      body: JSON.stringify({ message, thread_id: threadId }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'token') {
            fullText += data.content;
            bubble.innerHTML = renderMarkdown(fullText);
            chatMessages.scrollTop = chatMessages.scrollHeight;
          } else if (data.type === 'done') {
            threadId = data.thread_id;
          } else if (data.type === 'error') {
            bubble.innerHTML = `<span style="color:#c00">오류: ${escapeHtml(data.content)}</span>`;
          }
        } catch {}
      }
    }
  } catch (err) {
    bubble.innerHTML = `<span style="color:#c00">연결 오류: ${escapeHtml(err.message)}</span>`;
  }

  agentDiv.classList.remove('streaming');
  bubble.innerHTML = renderMarkdown(fullText);
  isStreaming = false;
  sendBtn.disabled = !chatInput.value.trim();
}
</script>
{% endblock %}
