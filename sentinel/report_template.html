<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  @page {
    size: A4;
    margin: 24mm 20mm 24mm 20mm;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
    font-size: 9.5pt;
    line-height: 1.7;
    color: #1a1a1a;
    background: #f5f5f5;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 20px auto;
    padding: 32mm 24mm 28mm 24mm;
    background: #fff;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  @media print {
    body { background: #fff; }
    .page { box-shadow: none; margin: 0; padding: 24mm 20mm; }
    .page-break { page-break-before: always; }
  }

  /* --- McKinsey Header --- */
  .report-header {
    border-bottom: 2px solid #1a1a1a;
    padding-bottom: 16px;
    margin-bottom: 28px;
  }
  .report-header h1 {
    font-size: 22pt;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .report-header .subtitle {
    font-size: 10pt;
    color: #666;
    font-weight: 400;
  }
  .report-header .meta {
    display: flex;
    gap: 28px;
    margin-top: 12px;
    font-size: 9pt;
    color: #999;
  }

  /* --- Executive Summary --- */
  .summary-box {
    border: 1px solid #e0e0e0;
    padding: 18px 22px;
    margin-bottom: 28px;
  }
  .summary-box h2 {
    font-size: 10pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #1a1a1a;
    margin-bottom: 10px;
  }
  .summary-box ul { padding-left: 18px; }
  .summary-box li {
    margin-bottom: 4px;
    font-size: 9.5pt;
    color: #333;
  }

  /* --- Section Titles --- */
  h2.section-title {
    font-size: 12pt;
    font-weight: 700;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 6px;
    margin-top: 30px;
    margin-bottom: 16px;
  }
  h3 {
    font-size: 10pt;
    font-weight: 600;
    color: #333;
    margin-top: 20px;
    margin-bottom: 8px;
  }

  /* --- KPI Grid --- */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin-bottom: 24px;
    border: 1px solid #e0e0e0;
  }
  .kpi-card {
    padding: 16px 18px;
    text-align: center;
    border-right: 1px solid #e0e0e0;
    border-bottom: 1px solid #e0e0e0;
  }
  .kpi-card:nth-child(3n) { border-right: none; }
  .kpi-card:nth-last-child(-n+3) { border-bottom: none; }
  .kpi-card .kpi-value {
    font-size: 20pt;
    font-weight: 700;
    color: #1a1a1a;
  }
  .kpi-card .kpi-label {
    font-size: 7.5pt;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }
  .kpi-card .kpi-sub {
    font-size: 7.5pt;
    color: #bbb;
    margin-top: 2px;
  }
  .kpi-card.highlight { background: #fafafa; }
  .kpi-card.warning .kpi-value { color: #c5a000; }
  .kpi-card.danger .kpi-value { color: #c0392b; }

  /* --- Tables --- */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 18px;
    font-size: 8.5pt;
  }
  thead th {
    background: #1a1a1a;
    color: #fff;
    font-weight: 600;
    padding: 8px 12px;
    text-align: left;
    font-size: 7.5pt;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  thead th:first-child { border-radius: 0; }
  thead th:last-child { border-radius: 0; }
  tbody td {
    padding: 7px 12px;
    border-bottom: 1px solid #eee;
    color: #333;
  }
  tbody tr:hover { background: #fafafa; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; font-family: 'SF Mono', 'Consolas', monospace; }
  .cost { color: #1a1a1a; font-weight: 600; }
  .high-cost { color: #c0392b; font-weight: 600; }
  .latency { color: #555; }

  /* --- Callout / Alert --- */
  .alert {
    padding: 14px 18px;
    margin-bottom: 12px;
    font-size: 9pt;
    border: 1px solid #e0e0e0;
    background: #fafafa;
  }
  .alert-critical { border-left: 3px solid #c0392b; }
  .alert-warning { border-left: 3px solid #c5a000; }
  .alert-info { border-left: 3px solid #1a1a1a; }
  .alert-success { border-left: 3px solid #27ae60; }
  .alert strong { font-weight: 700; }

  /* --- Action Items --- */
  .action-list { list-style: none; padding: 0; }
  .action-list li {
    padding: 10px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 9pt;
    border: 1px solid #e0e0e0;
    background: #fafafa;
  }
  .action-list .badge {
    display: inline-block;
    padding: 2px 8px;
    font-size: 7pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .badge-critical { background: #c0392b; color: #fff; }
  .badge-important { background: #c5a000; color: #fff; }
  .badge-improve { background: #1a1a1a; color: #fff; }

  /* --- Footer --- */
  .report-footer {
    margin-top: 36px;
    padding-top: 12px;
    border-top: 1px solid #e0e0e0;
    font-size: 7.5pt;
    color: #bbb;
    display: flex;
    justify-content: space-between;
  }

  /* --- Misc --- */
  p { margin-bottom: 8px; }
  .text-muted { color: #999; font-size: 8pt; }
</style>
</head>
<body>
<div class="page">

{{content}}

<div class="report-footer">
  <span>Sentinel LLMOps Agent — Confidential</span>
  <span>{{generated_at}}</span>
</div>

</div>
</body>
</html>
